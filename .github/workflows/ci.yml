# name: CI
# name: # keep this field blank to automatically show the filename that triggers it in the CD/CD web UI
name: ci.yml

on:
  push:
    branches:
      - main
      - "dev*"  # Explicity include branches with "dev" in the name (e.g., dev, dev-feature, etc.)
    # Only trigger if files in these paths change
    paths:
      - 'src/**'                    # Any source code changes
      - 'pyproject.toml'            # Any dependency changes
      - 'uv.lock'                   # Any locked version changes
      - '.github/workflows/ci.yml'  # Changes to the workflow itself
      - 'src/rattlesnake/cicd/**'   # Changes to your reporting scripts
  pull_request:
    branches:
      - main
      - "dev*"  # Explicity include branches with "dev" in the name (e.g., dev, dev-feature, etc.)
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - 'src/rattlesnake/cicd/**'


# Concurrency ensures that if you push again while a build is already running, the old one is canceled to save time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force all JavaScript actions to run on Node 24 (The 2026 Standard)
  # After 02 June 2026, the following line can be removed since on that date,
  # Node.js 24 will be the GitHub default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # `BASE_URL` determines the website is served from, including CSS & JS assets
  # This is dynamically set based on the branch to ensure correct pathing on GitHub Pages
  BASE_URL: /${{ github.event.repository.name }}/${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}/book/jupyter/

jobs:

  # 2026-03-13: We cannot use uv with the test matrix because of Qt.  There is
  # a known challenge with PyQt5 on modern macOS (particularly M1/M2/M3 Silicon)
  # and some Windows environments.  PyQt does not have pre-built wheels for every
  # combination of OS and Python version, and uv is very strict about this.
  pytest_matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

        # By default, the GitHub Action actions/checkout performs a "shallow clone."
        # This means it only downloads the very latest commit to save time.
        # However, a shallow clone does not include the tags or history.
        # Without that information, hatch-vcs won't know what version your code is
        # and might default to 0.0.0 or fail during the build.  Setting
        # fetch-depth: 0 tells GitHub to download the entire commit history
        # and all tags, which gives Hatch the information it needs to correctly
        # calculate the version.

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run tests
        run: |
          python -m pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        # Note: 'version' refers to the uv version itself
        version: "latest"
        python-version: "3.12"

    - name: Install dependencies
      # "uv sync" uses uv.lock to install exactly what you need
      # --all-extras ensures [dev] or other extras are included
      # if the pyproject.toml file changes, run "uv sync" and check into
      # GitHub both the pyproject.toml file and the uv.lock file.
      run: uv sync --all-extras --dev
        
    - name: lint analysis and custom lint HTML report
      run: |
        # Create a timestamp for the output file
        TIMESTAMP=$(date +"%Y%m%d_%H%M%S_%Z")
        LINT_OUTPUT_FILE="lint_output_${TIMESTAMP}.txt"

        # Run pylint once using 'uv run' (which automatically uses the synced venv)
        # and capturing the output to a variable.
        # This avoids reading the file twice.
        LINT_OUTPUT=$(uv run pylint src/rattlesnake --output-format=text --reports=yes || true)
        echo "$LINT_OUTPUT" > "$LINT_OUTPUT_FILE"

        # Extract the score from the captured output
        SCORE=$(echo "$LINT_OUTPUT" | grep "Your code has been rated at" | awk '{print $7}' | cut -d'/' -f1 || echo "0")

        # Output the score and file name
        echo "🏁 Lint analysis completed. 🏁"
        echo "    📄 Output file: $LINT_OUTPUT_FILE"
        echo "    🏆 Lint score: $SCORE out of 10"

        # The report_lint.py script still needs the file, which we created above.
        uv run python src/rattlesnake/cicd/report_lint.py \
          --input_file "$LINT_OUTPUT_FILE" \
          --output_file lint_report.html \
          --timestamp "$TIMESTAMP" \
          --run_id ${{ github.run_id }} \
          --ref_name ${{ github.ref_name }} \
          --github_sha ${{ github.sha }} \
          --github_repo ${{ github.repository }}

    - name: Upload lint artifact
      uses: actions/upload-artifact@v7
      with:
        name: lint-report
        path: |
          lint_report.html
          lint_output_*.txt

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: coverage analysis and custom coverage HTML report
        run: |
          # Create a timestamp for the output file
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S_%Z")

          uv run pytest -v --cov=rattlesnake --cov-report=html --cov-report=xml --cov-report=term-missing

          uv run python src/rattlesnake/cicd/report_coverage.py \
            --input_file coverage.xml \
            --output_file coverage_report.html \
            --timestamp "$TIMESTAMP" \
            --run_id ${{ github.run_id }} \
            --ref_name ${{ github.ref_name }} \
            --github_sha ${{ github.sha }} \
            --github_repo ${{ github.repository }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage_report.html
            htmlcov/
            coverage.xml

  # This job builds the Jupyter Book documentation and uploads it as an artifact. It runs on Ubuntu with Python 3.12.
  # To test locally:
  # 1. Install uv: https://astral.sh/uv/installation/
  # 2. Run `uv pip install "jupyter-book>=2.0.0"`
  # 3. Run `cd documentation && uv run jupyter book build --html --strict && cd ..` from the root of the repository to build the book. The output will be in documentation/_build/html
  docs_jupyter_book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Update Jupyter Book metadata
        run: |
          # Create a timestamp for the output file
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S_%Z")

          uv run python src/rattlesnake/cicd/report_jupyter_book.py \
            --myst_file documentation/myst.yml \
            --timestamp "$TIMESTAMP" \
            --run_id ${{ github.run_id }} \
            --ref_name ${{ github.ref_name }} \
            --github_sha ${{ github.sha }} \
            --github_repo ${{ github.repository }}

      - name: Build the book
        run: |
          # Build the book. We use --strict to ensure any errors fail the job.
          cd documentation && uv run jupyter book build --html --strict && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: jupyter-book-report
          path: documentation/_build/html

  deploy:
    needs: [pytest_matrix, lint, coverage, docs_jupyter_book]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Download lint artifact
        uses: actions/download-artifact@v7
        with:
          name: lint-report
          path: lint-report
          
      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

      - name: Download jupyter book artifact
        uses: actions/download-artifact@v7
        with:
          name: jupyter-book-report
          path: jupyter-book-report

      - name: Set Deploy Directory
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "DEPLOY_SUBDIR=main" >> $GITHUB_ENV
          else
            echo "DEPLOY_SUBDIR=dev" >> $GITHUB_ENV
          fi

      - name: Create badges
        run: |
          # Lint badge (now using Python script)
          LINT_LOG=$(ls lint-report/lint_output_*.txt)
          uv run python src/rattlesnake/cicd/badge_lint.py \
            --input_file "$LINT_LOG" \
            --output_dir badges \
            --github_repo ${{ github.repository }} \
            --deploy_subdir ${{ env.DEPLOY_SUBDIR }} \
            --run_id ${{ github.run_id }} \
            --github_server_url ${{ github.server_url }}

          # Coverage badge (now using Python script)
          uv run python src/rattlesnake/cicd/badge_coverage.py \
            --input_file coverage-report/coverage.xml \
            --output_dir badges \
            --github_repo ${{ github.repository }} \
            --deploy_subdir ${{ env.DEPLOY_SUBDIR }} \
            --run_id ${{ github.run_id }} \
            --github_server_url ${{ github.server_url }}

      - name: Assemble pages directory
        run: |
          mkdir -p "pages/${{ env.DEPLOY_SUBDIR }}/reports/lint"
          mkdir -p "pages/${{ env.DEPLOY_SUBDIR }}/reports/coverage"
          mkdir -p "pages/${{ env.DEPLOY_SUBDIR }}/book/jupyter"
          mkdir -p "pages/${{ env.DEPLOY_SUBDIR }}/badges"
          
          mv lint-report/lint_report.html "pages/${{ env.DEPLOY_SUBDIR }}/reports/lint/index.html"
          mv coverage-report/coverage_report.html "pages/${{ env.DEPLOY_SUBDIR }}/reports/coverage/index.html"
          mv coverage-report/htmlcov/ "pages/${{ env.DEPLOY_SUBDIR }}/reports/coverage/"
          mv jupyter-book-report/* "pages/${{ env.DEPLOY_SUBDIR }}/book/jupyter/"
          cp badges/* "pages/${{ env.DEPLOY_SUBDIR }}/badges/"
          
          # Create a root index.html using the Python script
          uv run python src/rattlesnake/cicd/report_dashboard.py \
            --github_repo ${{ github.repository }} \
            --output_file pages/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Deploy reports for ${{ github.ref_name }} (${{ github.sha }})'

    # TODO: Publish to PyPI
