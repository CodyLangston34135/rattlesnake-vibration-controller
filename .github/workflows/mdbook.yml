
name: Deploy mdBook
on:
  push:
    branches:
      - main
      - dev
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          mkdir mdbook-bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=mdbook-bin
          echo `pwd`/mdbook-bin >> $GITHUB_PATH

      - name: Build mdBook
        run: mdbook build documentation/mdbook

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./documentation/mdbook/book
          destination_dir: book
          keep_files: true
