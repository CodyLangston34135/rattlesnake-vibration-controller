[book]
authors = ["Daniel P. Rohe", "Ryan Schultz", "Norman Hunter"]
description = "Rattlesnake is a combined-environments, multiple input/multiple output control system for dynamic excitation of structures under test."
language = "en"
src = "src"
title = "Rattlesnake Vibration Controller"

# Configuration for math rendering
[preprocessor.katex]
after = ["links"]

# Configuration for bibliography
[preprocessor.bib]
# Ensure bibliography.bib is in the same folder as this book.toml file
bibliography = "bibliography.bib"
title = "Bibliography"
render-bib = "cited"

# HTML Output settings
[output.html]
additional-css = ["theme/custom.css"]

# MANDATORY: This block prevents the 'mdbook-katex' 101 panic
[output.html.katex]
